name: Nightly pipeline + deploy console

# Every weeknight after US market close (23:00 UTC ≈ 6-7pm ET, DST-safe):
#   1. Run the quant engine: signals, buys/sells, Monte Carlo, backtest
#   2. Commit the refreshed data + updated positions state
#   3. Build the React console and deploy it to GitHub Pages
# Your team opens the GitHub Pages link each morning and sees fresh data.
# Can also be triggered manually from the Actions tab (Run workflow).

on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "console/**"
      - "engine/**"
      - "watchlist.csv"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: nightly-pipeline
  cancel-in-progress: false

jobs:
  pipeline-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install engine dependencies
        run: pip install -r engine/requirements.txt

      - name: Run daily pipeline
        # Only run the data pipeline on schedule/manual runs — code pushes
        # just redeploy the console with existing data.
        if: github.event_name != 'push'
        working-directory: engine
        run: python pipeline.py

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "quant-pipeline[bot]"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: nightly refresh $(date -u +%F)"
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Build console
        working-directory: console
        run: |
          npm ci
          mkdir -p public/data
          cp ../data/*.json public/data/ 2>/dev/null || true
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: console/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
